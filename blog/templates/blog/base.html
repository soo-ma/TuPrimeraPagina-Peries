<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mi App{% endblock %}</title>

    <style>
        body {
            font-family: Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #f4f7fb;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1e3a5f;
            padding: 15px 30px;
        }

        .nav-left a, .nav-right a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        .nav-left a:hover, .nav-right a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: white;
            margin: 20px auto;
            padding: 20px;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        h1, h2 {
            color: #1e3a5f;
        }

        a {
            color: #1e3a5f;
            text-decoration: none;
        }

        a:hover {
            color: #3b82f6;
        }

        button {
            background-color: #1e3a5f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #3b82f6;
        }

        input {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-left">
            <a href="{% url 'clientes_list' %}">Clientes</a>
            <a href="{% url 'crear_producto' %}">Productos</a>
            <a href="{% url 'crear_pedido' %}">Pedidos</a>
        </div>

        <div class="nav-right">
            <a href="{% url 'home' %}">Home</a>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
