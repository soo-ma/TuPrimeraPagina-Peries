{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Web Django</title>

    <style>
        body {
            margin: 0;
            font-family: Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e6f4f1, #d0ebe7);
        }

        h1 {
            text-align: center;
            color: #2c6e6f;
            margin-top: 30px;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 30px;
        }

        .card {
            background-color: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        a {
            text-decoration: none;
            color: #2c6e6f;
            font-weight: bold;
        }

        a:hover {
            color: #1b4d4f;
        }
    </style>
</head>

<body>

    {% include "blog/navbar.html" %}

    <h1>Gestión de Clientes y Productos</h1>

    <div class="container">
        {% block contenido %}
        {% endblock %}
    </div>

</body>
</html>
